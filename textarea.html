<html lang="en">

    <title>Document</title>

  <body>
    <h2>My Textarea Example</h2>
    <p>the textarea element is used to create a multi-line text input field.</p>
    <form action="/action_page.php">
      <textarea name="msg" id="msg" rows="4" cols="50" style="padding: 15px">
Enter your message here...</textarea
      ><br /><br />
      <input
        type="submit"
        name="submit"
        id="submit"
        style="
          padding: 10px 20px;
          background-color: rgb(49, 49, 231);
          color: white;
          border: none;
          cursor: pointer;
          border-radius: 50px;
        "
        value="Submit"
      />
    </form>
  </body>
